name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente na aba Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/datacenter-panel:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/datacenter-panel:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/datacenter-panel:buildcache,mode=max
