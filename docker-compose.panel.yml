version: '3.8'

services:
  datacenter-panel:
    image: sancore/datacenter-panel:latest
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: datacenter-panel
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
